name: Build Resource Pack

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Package resource pack
        run: zip -r Soul-Anchor-Resourcepack.zip assets pack.mcmeta pack.png

      - name: Upload resource pack
        uses: actions/upload-artifact@v4
        with:
          name: Soul-Anchor-Resourcepack
          path: Soul-Anchor-Resourcepack.zip
          if-no-files-found: error

